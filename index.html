    <style>
        html {
            scroll-behavior: smooth;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-header {
            background: rgba(17, 19, 23, 0.8);
            backdrop-filter: blur(12px);
        }
        .electric-glow {
            text-shadow: 0 0 15px rgba(46, 91, 255, 0.4);
        }
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -20;
            background: radial-gradient(circle at 50% 50%, #1a1c20 0%, #111317 100%);
            overflow: hidden;
        }
        .ambient-glow {
            position: absolute;
            width: 80vmax;
            height: 80vmax;
            background: radial-gradient(circle, rgba(46, 91, 255, 0.03) 0%, rgba(46, 91, 255, 0) 70%);
            border-radius: 50%;
            top: -40vmax;
            left: -40vmax;
            animation: moveGlow 25s infinite alternate ease-in-out;
            pointer-events: none;
        }
        @keyframes moveGlow {
            from { transform: translate(0, 0); }
            to { transform: translate(60vw, 40vh); }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-entrance {
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }

        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .animate-pulse-soft {
            animation: pulse-soft 2s infinite ease-in-out;
        }

        @media (prefers-reduced-motion: reduce) {
            .animate-entrance, .animate-pulse-soft, .ambient-glow {
                animation: none !important;
                opacity: 1 !important;
                transform: none !important;
            }
        }
    </style>
